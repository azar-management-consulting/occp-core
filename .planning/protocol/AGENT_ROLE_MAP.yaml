# ──────────────────────────────────────────────────────────────
# GAPS / TRUTH
# ──────────────────────────────────────────────────────────────
gaps:
  - id: dual-registry-mismatch
    severity: HIGH
    description: |
      api/routes/agents.py /api/v1/agents shows 11 internal types,
      while OpenClaw has 8 specialist agents. The two registries
      are not unified. A user calling /api/v1/agents will NOT see
      the specialist agents — only the bridge "openclaw" alias.

  - id: brain-flow-not-driving
    severity: HIGH
    description: |
      brain_conversations table = 0 rows.
      pending_approvals table = 0 rows.
      workflow_executions table = 0 rows.
      The new BrainFlowEngine + ConfirmationGate + WorkflowStore
      are deployed but the production traffic does NOT flow through
      them. Tasks ARE created (180 in tasks table) but only via
      legacy paths (test runs from this audit conversation).

  - id: agent-tool-allowlist-not-enforced
    severity: MEDIUM
    description: |
      AgentToolGuard is in log-only mode by design,
      but no audit shows actual denials. Need to verify it's
      receiving any traffic at all.

  - id: telegram-owner-id-zero
    severity: MEDIUM
    description: |
      OCCP_VOICE_TELEGRAM_OWNER_CHAT_ID=0 → channel_auth strict
      mode rejects all real Telegram messages unless allowlist
      is set. Voice pipeline is "started" but functionally inert
      until owner_id is set.
