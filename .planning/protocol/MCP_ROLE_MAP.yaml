# THE GAP
# ──────────────────────────────────────────────────────────────
gap_analysis:
  problem: |
    Henry has 28 MCP servers configured in Claude Code (MBA),
    but the OCCP server runtime cannot use them — they are
    client-side only. The OCCP "control plane" is therefore
    actually split:
      - Brian (server) can dispatch to 8 OpenClaw specialists
      - Henry's Claude Code (client) can use 28 MCPs
      - These two execution surfaces are NOT connected.

  consequence: |
    "Brian use the WordPress MCP" is impossible from Telegram/voice
    today. Only Henry's Claude Code session can. This blocks the
    "AI operating system" goal.

  required_to_close:
    - OCCP needs an MCP client of its own, OR
    - OpenClaw specialist agents need their own MCP server bindings, OR
    - A dispatcher in OCCP Brain that delegates MCP-bound tasks back
      to Henry's Claude Code via a callback channel.
