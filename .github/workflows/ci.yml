name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest -v \
            --cov=orchestrator \
            --cov=policy_engine \
            --cov=cli \
            --cov=api \
            --cov=adapters \
            --cov=config \
            --cov=store \
            --cov=security \
            --cov=sdk \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Verify test count floor
        run: |
          count=$(pytest --co -q 2>/dev/null | tail -1 | grep -oP '^\d+')
          echo "Collected $count tests"
          if [ "$count" -lt 325 ]; then
            echo "::error::Test count $count is below floor of 325"
            exit 1
          fi
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Security lint (bandit rules via ruff)
        run: ruff check --select S .

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build dashboard
        run: npm run build

  sdk-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
