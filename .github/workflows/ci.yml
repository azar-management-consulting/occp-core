name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest -v \
            --cov=orchestrator \
            --cov=policy_engine \
            --cov=cli \
            --cov=api \
            --cov=adapters \
            --cov=config \
            --cov=store \
            --cov=sdk \
            --cov-report=term-missing \
            --cov-report=xml
      - name: Verify test count floor
        run: |
          count=$(pytest --co -q 2>/dev/null | tail -1 | grep -oP '^\d+')
          echo "Collected $count tests"
          if [ "$count" -lt 310 ]; then
            echo "::error::Test count $count is below floor of 310 (was 313 at v0.7.0)"
            exit 1
          fi
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build dashboard
        run: npm run build

  sdk-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
