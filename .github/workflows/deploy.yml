name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ANTHROPIC_API_KEY
          script: |
            cd /opt/occp
            git pull origin main
            # Sync Anthropic key to .env if provided via GitHub secret
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              grep -q "OCCP_ANTHROPIC_API_KEY" .env 2>/dev/null && \
                sed -i "s|^OCCP_ANTHROPIC_API_KEY=.*|OCCP_ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY|" .env || \
                echo "OCCP_ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
            fi
            docker compose build --no-cache
            # Fix volume ownership for non-root container user (occp:1001)
            docker run --rm -v occp_occp-data:/data alpine chown -R 1001:1001 /data
            docker compose up -d
            # Sync landing page to Apache webroot
            rsync -a --delete /opt/occp/landing/ /var/www/occp.ai/ 2>/dev/null || \
              cp -r /opt/occp/landing/* /var/www/html/ 2>/dev/null || true
            # Copy llms.txt to webroot
            cp /opt/occp/llms.txt /var/www/occp.ai/ 2>/dev/null || \
              cp /opt/occp/llms.txt /var/www/html/ 2>/dev/null || true
            sleep 10
            curl -sf http://localhost:8000/api/v1/health || exit 1
            curl -sf http://localhost:3000/ || exit 1
            echo "Deploy OK: $(date -u)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
