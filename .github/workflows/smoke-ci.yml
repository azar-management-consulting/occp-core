name: Production Smoke Tests

on:
  schedule:
    # 03:00 UTC nightly
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke – ${{ matrix.surface }}
    runs-on: ubuntu-latest
    # Run all surfaces; collect failures before filing the issue
    strategy:
      fail-fast: false
      matrix:
        surface:
          - all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install smoke-test dependencies
        run: pip install --upgrade pytest httpx

      - name: Run smoke suite
        id: smoke_run
        run: pytest tests/smoke -v --smoke
        # Allow subsequent steps to read outcome even on failure
        continue-on-error: true

      - name: File production-incident issue on failure
        if: steps.smoke_run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Smoke] Production surface failure – ${now.slice(0, 10)}`,
              body: [
                "## Production Smoke Test Failure",
                "",
                `One or more smoke tests failed in the nightly run at **${now}**.`,
                "",
                `**Workflow run:** ${runUrl}`,
                "",
                "### Immediate actions",
                "1. Open the workflow run link above and inspect the failed step output.",
                "2. Reproduce locally: `pytest tests/smoke --smoke -v -s`",
                "3. Confirm endpoints with `curl -I <url>`",
                "4. Page on-call if `test_status_endpoint_healthy` or `test_api_response_under_1s` failed.",
                "",
                "cc @occp-oncall",
              ].join("\n"),
              labels: ["production-incident"],
            });

      # Surface the original pytest exit code so the job is red on failure
      - name: Propagate smoke result
        if: steps.smoke_run.outcome == 'failure'
        run: exit 1
