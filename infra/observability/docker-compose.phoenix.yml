# ============================================================================
# Phoenix (Arize AI) observability stack for OCCP
# ----------------------------------------------------------------------------
# Self-hosted LLM trace + eval UI. Accepts OTLP (gRPC 4317 / HTTP 4318) and
# renders gen_ai.* semantic convention spans out of the box.
#
# Usage:
#   cp .env.phoenix.example .env.phoenix
#   # edit secrets (PHOENIX_DB_URL, PHOENIX_SECRET)
#   docker compose -f docker-compose.phoenix.yml --env-file .env.phoenix up -d
#
# Target host: Hetzner AX41 brain server (195.201.238.144, 64 GB RAM).
# ============================================================================

name: occp-phoenix

# occp_default  — external network created by `docker compose up` in /opt/occp
#                      (project dir = occp-core → Docker names it occp_default)
# phoenix-internal   — internal bridge; postgres is NOT exposed on the shared network
networks:
  occp_default:
    name: occp_default
    external: true
  phoenix-internal:
    driver: bridge
    internal: true

volumes:
  phoenix-pg-data:
    name: phoenix-pg-data

services:
  phoenix-postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PHOENIX_PG_USER:-phoenix}
      POSTGRES_PASSWORD: ${PHOENIX_PG_PASSWORD:?phoenix postgres password required}
      POSTGRES_DB: ${PHOENIX_PG_DB:-phoenix}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - phoenix-pg-data:/var/lib/postgresql/data
    networks:
      - phoenix-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PHOENIX_PG_USER:-phoenix} -d ${PHOENIX_PG_DB:-phoenix}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 512m

  phoenix:
    image: arizephoenix/phoenix:14.14.0
    container_name: phoenix
    restart: unless-stopped
    depends_on:
      phoenix-postgres:
        condition: service_healthy
    environment:
      PHOENIX_HOST: ${PHOENIX_HOST:-0.0.0.0}
      PHOENIX_PORT: ${PHOENIX_PORT:-6006}
      PHOENIX_GRPC_PORT: ${PHOENIX_GRPC_PORT:-4317}
      PHOENIX_WORKING_DIR: /phoenix-data
      # PHOENIX_DB_URL format: postgresql://user:pass@host:5432/db
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_DB_URL}
      PHOENIX_ENABLE_AUTH: ${PHOENIX_ENABLE_AUTH:-true}
      PHOENIX_SECRET: ${PHOENIX_SECRET:?phoenix auth secret required}
    ports:
      # UI
      - "127.0.0.1:${PHOENIX_PORT:-6006}:6006"
      # OTLP gRPC
      - "127.0.0.1:${PHOENIX_GRPC_PORT:-4317}:4317"
      # OTLP HTTP
      - "127.0.0.1:${PHOENIX_HTTP_PORT:-4318}:4318"
    networks:
      - occp_default
      - phoenix-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6006/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          cpus: "0.5"
          memory: 1g
