services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${OCCP_API_PORT:-8000}:8000"
    environment:
      - OCCP_ENV=${OCCP_ENV:-development}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/status')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  dash:
    build:
      context: ./dash
      dockerfile: Dockerfile
    ports:
      - "${OCCP_DASH_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Development mode: mounts source code
  dash-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dash:/app:ro
      - dash_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev"]
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next
    profiles:
      - dev

  tests:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "pip install -e '.[dev]' && pytest -v --cov=orchestrator --cov=policy_engine --cov=cli --cov=api --cov=adapters"]
    profiles:
      - test
    security_opt:
      - no-new-privileges:true

volumes:
  dash_node_modules:
