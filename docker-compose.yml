services:
  dash:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dash:/app
    command: ["sh", "-lc", "npm install && npm run dev"]
    ports:
      - "${OCCP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development

  orchestrator:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "pip install -e . && python -c 'from orchestrator import Pipeline; print(\"Orchestrator ready\")'"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///occp.db}

  tests:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "pip install -e '.[dev]' && pytest -q"]
    profiles:
      - test
