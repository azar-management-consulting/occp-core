services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "127.0.0.1:${OCCP_API_PORT:-8000}:8000"
    volumes:
      - occp-data:/app/data
    env_file:
      - .env
    environment:
      - OCCP_ENV=${OCCP_ENV:-development}
      - OCCP_DATABASE_URL=sqlite+aiosqlite:///data/occp.db
      - OCCP_JWT_SECRET=${OCCP_JWT_SECRET:-}
      - OCCP_ADMIN_USER=${OCCP_ADMIN_USER:-admin}
      - OCCP_ADMIN_PASSWORD=${OCCP_ADMIN_PASSWORD:-changeme}
      - OCCP_ANTHROPIC_API_KEY=${OCCP_ANTHROPIC_API_KEY:-}
      - OCCP_CORS_ORIGINS=${OCCP_CORS_ORIGINS:-["https://dash.occp.ai","http://localhost:3000"]}
      # Brain / OpenClaw integration
      - OCCP_WEBHOOK_SECRET=${OCCP_WEBHOOK_SECRET:-}
      - OCCP_OPENCLAW_BASE_URL=${OCCP_OPENCLAW_BASE_URL:-http://localhost:8080}
      - OCCP_CONFIRMATION_GATE_TIMEOUT=${OCCP_CONFIRMATION_GATE_TIMEOUT:-300}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  dash:
    build:
      context: ./dash
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.occp.ai/api/v1}
        NEXT_PUBLIC_DASH_V2: ${NEXT_PUBLIC_DASH_V2:-true}
    ports:
      - "127.0.0.1:${OCCP_DASH_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.occp.ai/api/v1}
      - NEXT_PUBLIC_DASH_V2=${NEXT_PUBLIC_DASH_V2:-true}
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  landing:
    build:
      context: ./landing-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_OCCP_API_URL: ${NEXT_PUBLIC_OCCP_API_URL:-https://api.occp.ai}
    ports:
      - "127.0.0.1:${OCCP_LANDING_PORT:-3100}:3000"
    environment:
      - NEXT_PUBLIC_OCCP_API_URL=${NEXT_PUBLIC_OCCP_API_URL:-https://api.occp.ai}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  docs:
    build:
      context: ./docs-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_OCCP_API_URL: ${NEXT_PUBLIC_OCCP_API_URL:-https://api.occp.ai}
    ports:
      - "127.0.0.1:${OCCP_DOCS_PORT:-3200}:3000"
    environment:
      - NEXT_PUBLIC_OCCP_API_URL=${NEXT_PUBLIC_OCCP_API_URL:-https://api.occp.ai}
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "127.0.0.1:${CADDY_HTTP_PORT:-3300}:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      landing:
        condition: service_started
      docs:
        condition: service_started
    restart: unless-stopped

  # Development mode: mounts source code
  dash-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dash:/app:ro
      - dash_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev"]
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next
    profiles:
      - dev

  tests:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-lc", "pip install -e '.[dev]' && pytest -v --cov=orchestrator --cov=policy_engine --cov=cli --cov=api --cov=adapters --cov=config --cov=store --cov=sdk"]
    profiles:
      - test
    security_opt:
      - no-new-privileges:true

volumes:
  occp-data:
  dash_node_modules:
  caddy-data:
  caddy-config:
