  bundler: turbopack


deployment:
  containerization: docker-compose
  reverse_proxy: apache2 (ubuntu-24.04)
  ssl: letsencrypt (certbot)
  networking:
    public_endpoints:
      - https://occp.ai (landing)
      - https://api.occp.ai (backend)
      - https://dash.occp.ai (frontend)
      - https://www.occp.ai (redirect)
    internal:
      - wss://claw.occp.ai (openclaw gateway)


control_plane_mesh:
  overlay: tailscale
  nodes:
    - id: mba-henry
      tailscale_ip: 100.114.146.86
      role: claude-code-host
    - id: imac-henry
      tailscale_ip: 100.88.122.102
      role: storage + secondary
    - id: mbp-henry
      tailscale_ip: 100.65.58.71
      role: secondary-dev
    - id: hetzner-occp-brain
      tailscale_ip: null  # public only
      role: brain-plane
    - id: hetzner-openclaw
      tailscale_ip: null  # public only
      role: execution-plane


external_apis:
  - name: anthropic
    purpose: Primary LLM for planning + chat
    billing: pay-per-use
    rate_limit: model tier
    critical: true

  - name: openai
    purpose: Whisper transcription + GPT fallback
    billing: pay-per-use
    critical: true

  - name: telegram-bot
    purpose: User interaction channel
    billing: free
    critical: true

  - name: hetzner-api
    purpose: Server management
    billing: monthly
    critical: false  # only for scaling

  - name: cloudflare-api
    purpose: DNS + edge
    billing: free tier
    critical: false

  - name: hostinger-api
    purpose: Domain + shared hosting
    billing: monthly
    critical: false


