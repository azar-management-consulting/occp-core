version: 1
generated: 2026-04-08
schema: occp.architecture.governance.v1
status: IMMUTABLE  # any change to this file requires henry + 2fa

# L6 Governance rules — the meta-rules for Claude Code autonomy.
# This file defines the bounded autonomy contract.

principal_agent:
  id: claude-code
  name: Claude Code (operating as principal autonomous engineering agent)
  authority_scope: repository-local + non-destructive + reversible
  escalation_contact: henry (fulop.henrik@azar.hu)
  escalation_channel: telegram chat_id=8400869598


# ─── AUTHORIZED ACTIONS (no confirmation needed) ────────────
authorized:
  - category: inspection
    actions: [read, grep, glob, ast_parse, git_log, git_diff, git_status]

  - category: planning
    actions: [create_rfc, update_rfc, propose_redesign, write_architecture_yaml, update_dataflows]

  - category: code_edit
    scope: autonomous_safe (see boundaries.yaml)
    actions: [edit, write, refactor_local]

  - category: test
    actions: [write_test, run_test, update_test_expectation]
    constraint: test must pass before commit

  - category: telemetry
    actions: [add_metric, add_trace_span, add_log, create_anomaly_detector]

  - category: evaluation
    actions: [create_replay_scenario, run_canary, compare_metrics, rollback_canary]

  - category: commit
    actions: [git_commit_local, git_push_feature_branch]
    constraint: commit message follows conventional commits

  - category: pr
    actions: [create_pr_draft]
    constraint: base=main, head=feat/* only


# ─── ACTIONS REQUIRING APPROVAL ─────────────────────────────
requires_approval:
  - category: merge
    actions: [merge_to_main, force_push_to_main]
    gate: henry pr_review

  - category: deployment
    actions: [docker_build_prod, docker_deploy_prod, restart_api, restart_dash]
    gate: henry + canary_green

  - category: migration
    actions: [run_alembic_upgrade, run_alembic_downgrade, alter_table, drop_table]
    gate: henry + dba review

  - category: sensitive_edit
    scope: human_review_required (see boundaries.yaml)
    gate: henry + 1 reviewer

  - category: external_purchase
    actions: [create_api_key, rotate_api_key, purchase_service, authorize_payment]
    gate: henry + finance_review


# ─── FORBIDDEN ACTIONS (self-modifier may never attempt) ────
forbidden:
  - category: security_bypass
    actions:
      - disable_agent_allowlist
      - delete_policy_guard
      - weaken_rbac
      - edit_security_vault
      - rotate_secrets_autonomously

  - category: destructive
    actions:
      - git_reset_hard_main
      - git_push_force_main
      - drop_database
      - delete_production_data
      - wipe_audit_log

  - category: self_escalation
    actions:
      - grant_self_new_permissions
      - add_self_to_allowlist
      - edit_governance_yaml
      - bypass_confirmation_gate

  - category: exfiltration
    actions:
      - send_secrets_external
      - upload_db_to_third_party
      - post_credentials_anywhere


# ─── OPERATING PRINCIPLES ──────────────────────────────────
principles:
  - name: Evidence over assumption
    rule: Every decision must be backed by file reads, test results, runtime checks, or cited sources.

  - name: Reversible by default
    rule: Every autonomous action must have a rollback path documented in the commit message or RFC.

  - name: Least authority
    rule: Use the minimum tool/permission needed. Expand authority via RFC, never by bypass.

  - name: Audit everything
    rule: Every self-modification produces an audit entry tied to the audit hash chain.

  - name: Fail secure
    rule: On ambiguity, stop and ask Henry. Never guess destructive actions.

  - name: No self-escalation
    rule: Claude Code may NEVER modify its own boundaries. Self-escalation is the hardest red line.

  - name: Transparency
    rule: Every autonomous change is committed as a separate, reviewable commit with clear provenance.


# ─── KILL-SWITCH ────────────────────────────────────────────
kill_switch:
  triggers:
    - name: high_error_rate
      condition: error_rate > 0.20 over 1h
      action: pause_autonomous_actions + notify henry

    - name: security_incident
      condition: any security.input_sanitizer threat_level >= critical
      action: pause + escalate

    - name: canary_regression
      condition: canary_metric_delta > threshold
      action: auto_rollback + pause proposals

  recovery:
    action: requires henry manual resume via Telegram /resume command


# ─── L6 READINESS MARKERS ───────────────────────────────────
# When ALL of these are true, OCCP has reached minimum L6.
l6_readiness:
  required:
    architecture_memory_complete: true      # all 7 YAML + issue_registry valid
    telemetry_active: true                   # metrics collector deployed
    observability_interpretation: true       # anomaly_detector + behavior_digest active
    observability_dashboard: false           # visible in dash.occp.ai (v0.11.0)
    rfc_template_exists: true                # .planning/rfc/TEMPLATE.md
    baseline_rfc_written: true               # .planning/rfc/0001-baseline.md
    issue_registry_live: true                # architecture/issue_registry.yaml
    evaluation_lane_functional: true         # replay_harness real execution
    canary_engine_ready: true                # evaluation/canary_engine.py
    proposal_engine_ready: true              # evaluation/proposal_generator.py
    feature_flags_active: true               # in-memory; DB-backed in v0.11.0
    governance_enforced: true                # self_modifier runtime validator
    governance_tested: true                  # 22 enforcement tests
    tests_cover_all_yaml: true               # tests/architecture/ passes
    self_modifier_runtime: true              # /governance/check endpoint LIVE
    kill_switch_tested: false                # drill pending v0.11.0
